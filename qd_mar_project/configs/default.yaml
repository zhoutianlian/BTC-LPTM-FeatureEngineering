    - path_raw_plie_total_bps
    - path_net_braw_bps
    - path_direction_consistency
    - path_liq_neutrality_score
    - path_snr
    - path_active_z
    - path_active_dominance_score
    - path_active_dominance_price_score
    - path_aligned_response_bps
    - path_transmission_ratio
    - path_absorption_score_0_100
    - path_quality
    - path_data_quality
    - path_signal_clarity
    - path_activity_level
    - path_pressure_rejection_score
